services:
  - type: web
    name: rrrrhema-backend
    env: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: rrrrhema-db
          property: connectionString

databases:
  - name: rrrrhema-db
    plan: free
